<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵气泡 - Mind Bubble</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CSS 变量定义 - 根据情绪动态更新 */
        :root {
            --primary-color: #1a1a2e;
            --secondary-color: #16213e;
            --accent-color: #e0e0e0;
            --emotion-color: #e0e0e0;
            --glow-color: rgba(224, 224, 224, 0.3);
        }

        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: var(--accent-color);
            overflow: hidden;
            user-select: none;
            cursor: default;
            transition: background 0.8s ease;
            perspective: 1000px;
        }

        /* 动态背景粒子流 */
        .background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.5;
        }

        /* 主容器 */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            pointer-events: auto;
        }

        /* 初始阶段：液态光球 */
        .liquid-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            cursor: pointer;
            filter: drop-shadow(0 0 40px var(--emotion-color));
            transition: filter 0.3s ease;
            pointer-events: auto;
            z-index: 25;
        }

        .liquid-orb:hover {
            filter: drop-shadow(0 0 60px var(--emotion-color));
        }

        .liquid-orb svg {
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        /* 情绪选择器 */
        .emotion-selector {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            padding-bottom: 50px;
            overflow: hidden;
            z-index: 20;
            transition: height 0.5s ease;
        }

        .emotion-selector.active {
            height: 180px;
            padding-bottom: 50px;
        }

        .emotion-ball {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            filter: drop-shadow(0 0 15px currentColor);
            opacity: 0;
            transform: scale(0) translateY(50px);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .emotion-selector.active .emotion-ball {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .emotion-ball:nth-child(1) {
            background: linear-gradient(135deg, #8b8b8b 0%, #a9a9a9 100%);
            transition-delay: 0.05s;
        }

        .emotion-ball:nth-child(2) {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            transition-delay: 0.1s;
        }

        .emotion-ball:nth-child(3) {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            transition-delay: 0.15s;
        }

        .emotion-ball:nth-child(4) {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            transition-delay: 0.2s;
        }

        .emotion-ball:nth-child(5) {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            transition-delay: 0.25s;
        }

        .emotion-ball:hover {
            transform: scale(1.1) translateY(-10px);
            filter: drop-shadow(0 0 25px currentColor);
        }

        /* 提示文案 */
        .hint-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: 300;
            opacity: 0;
            pointer-events: none;
            max-width: 80%;
            text-align: center;
            line-height: 1.6;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }

        .hint-text.active {
            animation: none;
            opacity: 0.8;
        }

        /* 初始引导动画 */
        .intro-guide {
            position: absolute;
            top: 20%;
            font-size: 16px;
            color: var(--text-muted);
            opacity: 0;
            animation: guideFade 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes guideFade {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.7; transform: translateY(-10px); }
        }

        /* 点击波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 长按提示 */
        .press-hint {
            position: absolute;
            top: 40%;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            animation: float 2s ease-in-out infinite;
            text-align: center;
            width: 100%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0; }
            50% { transform: translateY(-20px); opacity: 0.8; }
        }

        /* 倒计时数字 */
        .countdown-number {
            position: absolute;
            font-size: 80px;
            font-weight: bold;
            color: var(--emotion-color);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            text-shadow: 0 0 30px var(--emotion-color);
            transition: all 0.3s ease;
        }

        .countdown-number.show {
            opacity: 1;
            transform: scale(1.2);
        }

        /* 心跳效果 */
        .heartbeat {
            animation: heartbeat 1s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* 光晕扩散 */
        .glow-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 3px solid var(--emotion-color);
            opacity: 0;
            pointer-events: none;
            z-index: 4;
            animation: glowExpand 2s ease-out infinite;
        }

        @keyframes glowExpand {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* 飘落花瓣容器 */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 16;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.3));
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            animation: petalFall linear forwards;
        }

        @keyframes petalFall {
            0% { 
                transform: translateY(-20px) rotate(0deg) translateX(0); 
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(100vh) rotate(720deg) translateX(100px); 
                opacity: 0;
            }
        }

        /* 星星效果 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: starTwinkle 2s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 彩虹光效 */
        .rainbow-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, 
                rgba(255, 0, 0, 0.1), 
                rgba(255, 165, 0, 0.1), 
                rgba(255, 255, 0, 0.1), 
                rgba(0, 128, 0, 0.1), 
                rgba(0, 0, 255, 0.1), 
                rgba(75, 0, 130, 0.1), 
                rgba(238, 130, 238, 0.1), 
                rgba(255, 0, 0, 0.1));
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            animation: rainbowRotate 4s linear infinite;
        }

        @keyframes rainbowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .rainbow-glow.active {
            opacity: 1;
        }

        /* 长按进度环 */
        .press-progress {
            position: absolute;
            width: 350px;
            height: 350px;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.3s ease;
        }

        .press-progress.show {
            opacity: 1;
        }

        .press-progress svg {
            width: 100%;
            height: 100%;
        }

        .progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring circle {
            fill: none;
            stroke: var(--emotion-color);
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--emotion-color));
            stroke-dasharray: 900;
            stroke-dashoffset: 900;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* 语录显示区域 */
        .quote-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
        }

        .quote-container.show {
            opacity: 1;
            pointer-events: auto;
        }

        .quote-text {
            font-size: 28px;
            line-height: 1.8;
            max-width: 70%;
            text-align: center;
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px var(--glow-color);
            margin-bottom: 80px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .quote-text::before,
        .quote-text::after {
            content: '"';
            font-size: 60px;
            position: absolute;
            color: var(--emotion-color);
            opacity: 0.3;
            text-shadow: 0 0 20px var(--emotion-color);
        }

        .quote-text::before {
            top: -30px;
            left: -20px;
        }

        .quote-text::after {
            bottom: -50px;
            right: -20px;
        }

        /* 操作按钮 */
        .action-buttons {
            position: absolute;
            bottom: 80px;
            display: flex;
            gap: 30px;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
        }

        .action-buttons.show {
            opacity: 1;
            pointer-events: auto;
        }

        .btn {
            padding: 14px 28px;
            font-size: 16px;
            border: 2px solid var(--emotion-color);
            background: rgba(224, 224, 224, 0.1);
            color: var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .btn:hover {
            background: rgba(224, 224, 224, 0.2);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* 粒子容器 */
        .particle-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 15;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .liquid-orb {
                width: 220px;
                height: 220px;
            }

            .emotion-ball {
                width: 60px;
                height: 60px;
            }

            .hint-text {
                font-size: 18px;
            }

            .quote-text {
                font-size: 20px;
                max-width: 85%;
            }

            .quote-text::before,
            .quote-text::after {
                font-size: 40px;
            }

            .quote-text::before {
                top: -20px;
                left: -15px;
            }

            .quote-text::after {
                bottom: -35px;
                right: -15px;
            }

            .emotion-selector {
                gap: 15px;
                padding-bottom: 40px;
                height: 150px;
            }

            .emotion-selector.active {
                height: 150px;
            }

            .press-progress {
                width: 260px;
                height: 260px;
            }

            .countdown-number {
                font-size: 60px;
            }

            .glow-ring {
                width: 220px;
                height: 220px;
            }

            .rainbow-glow {
                width: 300px;
                height: 300px;
            }

            .action-buttons {
                bottom: 60px;
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }

            .petal {
                width: 12px;
                height: 12px;
            }
        }

        /* 动画关键帧 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 40px var(--emotion-color)); }
            50% { filter: drop-shadow(0 0 60px var(--emotion-color)); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            20% { transform: translate(5px, 5px); }
            30% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            50% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            70% { transform: translate(-3px, 3px); }
            80% { transform: translate(3px, -3px); }
            90% { transform: translate(-2px, -2px); }
        }

        .breathing {
            animation: breathe 3s ease-in-out infinite;
        }

        .shaking {
            animation: shake 0.1s infinite;
        }

        /* 通用样式 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 背景粒子容器 -->
    <canvas class="background-canvas" id="bgCanvas"></canvas>

    <div class="container">
        <!-- 液态光球 -->
        <div class="liquid-orb" id="liquidOrb">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <!-- 定义液态效果滤镜 -->
                <defs>
                    <filter id="liquidFilter">
                        <!-- 使用turbulence生成流体纹理 -->
                        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" seed="2" />
                        <!-- 使用displacementMap扭曲形状 -->
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                    <!-- 径向渐变定义 -->
                    <radialGradient id="orbGradient" cx="40%" cy="40%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
                        <stop offset="50%" style="stop-color:#e0e0e0;stop-opacity:0.4" />
                        <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:0.2" />
                    </radialGradient>
                </defs>
                <!-- 主光球 -->
                <circle cx="150" cy="150" r="120" fill="url(#orbGradient)" filter="url(#liquidFilter)" opacity="0.8" />
                <!-- 内部辉光 -->
                <circle cx="150" cy="150" r="100" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3" />
            </svg>
        </div>

        <!-- 提示文案 -->
        <div class="hint-text" id="hintText">此刻，你心里装着什么颜色的情绪？</div>

        <!-- 初始引导 -->
        <div class="intro-guide" id="introGuide">点击光球开始治愈之旅</div>

        <!-- 长按提示 -->
        <div class="press-hint" id="pressHint">按住我，把情绪交给我</div>

        <!-- 长按进度环 -->
        <div class="press-progress" id="pressProgress">
            <svg viewBox="0 0 350 350" xmlns="http://www.w3.org/2000/svg">
                <circle class="progress-ring" cx="175" cy="175" r="160" />
            </svg>
        </div>

        <!-- 倒计时数字 -->
        <div class="countdown-number" id="countdownNumber">3</div>

        <!-- 光晕扩散 -->
        <div class="glow-ring" id="glowRing"></div>

        <!-- 彩虹光效 -->
        <div class="rainbow-glow" id="rainbowGlow"></div>

        <!-- 飘落花瓣容器 -->
        <div class="petals-container" id="petalsContainer"></div>

        <!-- 粒子容器 -->
        <canvas class="particle-canvas" id="particleCanvas"></canvas>

        <!-- 情绪选择器 -->
        <div class="emotion-selector" id="emotionSelector">
            <div class="emotion-ball" data-emotion="gray"></div>
            <div class="emotion-ball" data-emotion="blue"></div>
            <div class="emotion-ball" data-emotion="red"></div>
            <div class="emotion-ball" data-emotion="purple"></div>
            <div class="emotion-ball" data-emotion="green"></div>
        </div>

        <!-- 语录显示区域 -->
        <div class="quote-container" id="quoteContainer">
            <div class="quote-text" id="quoteText"></div>
            <div class="action-buttons" id="actionButtons">
                <button class="btn" id="downloadBtn">📥 封存这张卡片</button>
                <button class="btn" id="restartBtn">🔄 再来一次</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置和常量 ====================
        const CONFIG = {
            emotion: {
                gray: { color: '#8b8b8b', label: '焦虑' },
                blue: { color: '#4a90e2', label: '悲伤' },
                red: { color: '#e74c3c', label: '愤怒' },
                purple: { color: '#9b59b6', label: '迷茫' },
                green: { color: '#2ecc71', label: '平静' }
            },
            healingQuotes: {
                gray: [
                    "焦虑是在提醒你，你在乎。这意味着你还有力量去改变。",
                    "无法控制的事情，值得被放下。能控制的小事，足以改变一切。",
                    "深呼吸。世界不会因为你的担忧而加速，只会因为你的行动而改变。",
                    "焦虑的时候，看看你的脚下——此刻这一步，已经很稳了。",
                    "你正在经历的，是成长的代价。这个过程会让你更懂自己。"
                ],
                blue: [
                    "悲伤不是漏洞，它是心灵在下雨。雨停之后，你会比从前更清澈。",
                    "沉默的眼泪有时比千言万语更有力量。允许自己感受，才能真正释放。",
                    "最深的悲伤里，往往藏着最真的珍惜。感谢那些让你心痛的人，他们教会了你什么是爱。",
                    "这一刻的难过，是未来精彩的伏笔。",
                    "像雨一样落下，像彩虹一样升起——悲伤的另一端，是新生。"
                ],
                red: [
                    "火焰可以烧毁一切，也可以锻造钢铁。你的怒火，值得用在更热的地方。",
                    "愤怒是信号，不是错误。它在告诉你边界被侵犯了。保护好自己，然后继续前行。",
                    "怒气像洪水——压制它会溃堤，疏导它才能灌溉田地。",
                    "你有权利生气，但更有权利选择何时平复。这份选择权，就是你的力量。",
                    "转身的一刻，你赢了。因为你选择了自己，而非被怒火吞没。"
                ],
                purple: [
                    "迷雾中不需要看清整条路，只要看清脚下的这一步。",
                    "不知道方向时，至少可以确定方向，这本身就是进步。",
                    "迷茫是探索的起点。每个转身都可能是发现。",
                    "你的困惑是真实的，你的探索也是有意义的。给自己多一点耐心。",
                    "即便看不清前方，你也可以选择做仁慈、诚实的人。这就足够了。"
                ],
                green: [
                    "平静不是没有情绪，而是与所有情绪和平共处。你正在做那件最难的事。",
                    "此刻的宁静，是灵魂在充电。享受这个时刻，让它浸透你的每一个细胞。",
                    "你放下了什么，所以才获得了这份清空。好好珍惜。",
                    "在平静中，你会听见自己真实的声音。那是来自深处的智慧。",
                    "和平的力量，远比你想象的要大。继续这样温柔地对待这个世界。"
                ]
            }
        };

        // ==================== 状态管理 ====================
        let appState = {
            currentEmotionKey: null,
            isSelecting: false,
            isRitualing: false,
            isPressing: false,
            pressStartTime: 0,
            mouseX: 0,
            mouseY: 0,
            orbFollowX: 0,
            orbFollowY: 0
        };

        // ==================== 音效合成 (Web Audio API) ====================
        class AudioSynth {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            // 生成风铃声 (清脆的上升音调)
            playChime(frequency = 1000, duration = 0.3) {
                const now = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();

                osc.connect(gain);
                gain.connect(this.audioContext.destination);

                osc.frequency.setValueAtTime(frequency, now);
                osc.frequency.exponentialRampToValueAtTime(frequency * 1.5, now + duration * 0.3);
                osc.frequency.exponentialRampToValueAtTime(frequency * 0.6, now + duration);

                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.start(now);
                osc.stop(now + duration);
            }

            // 生成白噪音 (风/海浪声)
            playWhiteNoise(duration = 1, intensity = 0.1) {
                const now = this.audioContext.currentTime;
                const bufferSize = this.audioContext.sampleRate * duration;
                const noiseBuffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const output = noiseBuffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                const noiseNode = this.audioContext.createBufferSource();
                const gain = this.audioContext.createGain();
                const filter = this.audioContext.createBiquadFilter();

                noiseNode.buffer = noiseBuffer;
                filter.type = 'lowpass';
                filter.frequency.value = 2000;

                noiseNode.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioContext.destination);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(intensity, now + duration * 0.5);
                gain.gain.linearRampToValueAtTime(0, now + duration);

                noiseNode.start(now);
                noiseNode.stop(now + duration);
            }

            // 生成键盘点击声
            playKeyTap(frequency = 800) {
                const now = this.audioContext.currentTime;
                const duration = 0.05;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();

                osc.connect(gain);
                gain.connect(this.audioContext.destination);

                osc.frequency.setValueAtTime(frequency, now);
                osc.frequency.exponentialRampToValueAtTime(frequency * 0.5, now + duration);

                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.start(now);
                osc.stop(now + duration);
            }
        }

        const audioSynth = new AudioSynth();

        // ==================== 粒子系统 ====================
        class ParticleSystem {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            // 产生爆炸粒子
            explodeFromCenter(color, count = 100) {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;

                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
                    const velocity = 3 + Math.random() * 4;

                    this.particles.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1,
                        color: color,
                        size: 3 + Math.random() * 2,
                        drag: 0.98 + Math.random() * 0.02
                    });
                }
            }

            // 牵引粒子到中心 (聚拢效果)
            attractToCenter(strength = 0.08) {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;

                this.particles.forEach(p => {
                    const dx = centerX - p.x;
                    const dy = centerY - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance > 50) {
                        p.vx += (dx / distance) * strength;
                        p.vy += (dy / distance) * strength;
                    }
                });
            }

            update() {
                this.particles = this.particles.filter(p => p.life > 0);

                this.particles.forEach(p => {
                    p.vx *= p.drag;
                    p.vy *= p.drag;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // 重力效应
                    p.life -= 0.008;
                });
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(p => {
                    this.ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('rgb', 'rgba');
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            animate(callback) {
                const loop = () => {
                    this.update();
                    this.render();
                    if (callback) callback();
                    if (this.particles.length > 0) {
                        requestAnimationFrame(loop);
                    }
                };
                loop();
            }
        }

        const particleSystem = new ParticleSystem('particleCanvas');

        // ==================== 背景粒子流 ====================
        class BackgroundParticles {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.particleCount = 50;
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                this.init();
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            init() {
                this.particles = [];
                for (let i = 0; i < this.particleCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 0.5,
                        alpha: Math.random() * 0.5 + 0.2
                    });
                }
            }

            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha += (Math.random() - 0.5) * 0.02;
                    p.alpha = Math.max(0.1, Math.min(0.6, p.alpha));

                    // 循环边界
                    if (p.x < 0) p.x = this.canvas.width;
                    if (p.x > this.canvas.width) p.x = 0;
                    if (p.y < 0) p.y = this.canvas.height;
                    if (p.y > this.canvas.height) p.y = 0;
                });
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(p => {
                    this.ctx.fillStyle = `rgba(224, 224, 224, ${p.alpha})`;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            animate() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.animate());
            }
        }

        const bgParticles = new BackgroundParticles('bgCanvas');
        bgParticles.animate();

        // ==================== 界面管理 ====================
        class UIManager {
            constructor() {
                this.orbElement = document.getElementById('liquidOrb');
                this.emotionSelector = document.getElementById('emotionSelector');
                this.hintText = document.getElementById('hintText');
                this.pressHint = document.getElementById('pressHint');
                this.pressProgress = document.getElementById('pressProgress');
                this.quoteContainer = document.getElementById('quoteContainer');
                this.quoteText = document.getElementById('quoteText');
                this.actionButtons = document.getElementById('actionButtons');
            }

            showEmotionSelector() {
                this.emotionSelector.classList.add('active');
            }

            hideEmotionSelector() {
                this.emotionSelector.classList.remove('active');
            }

            showPressHint() {
                this.pressHint.style.opacity = '1';
                this.pressHint.style.pointerEvents = 'none';
            }

            hidePressHint() {
                this.pressHint.style.opacity = '0';
            }

            showPressProgress(value) {
                this.pressProgress.classList.add('show');
                const circle = this.pressProgress.querySelector('circle');
                const circumference = 2 * Math.PI * 160;
                const offset = circumference * (1 - value);
                circle.style.strokeDashoffset = offset;
            }

            hidePressProgress() {
                this.pressProgress.classList.remove('show');
            }

            showQuote(text) {
                this.quoteContainer.classList.add('show');
                this.typewriterEffect(text);
            }

            typewriterEffect(text) {
                this.quoteText.innerHTML = '';
                let index = 0;
                const typeInterval = setInterval(() => {
                    if (index < text.length) {
                        this.quoteText.innerHTML += text[index];
                        if (Math.random() > 0.7) {
                            audioSynth.playKeyTap(1200 + Math.random() * 400);
                        }
                        index++;
                    } else {
                        clearInterval(typeInterval);
                        this.actionButtons.classList.add('show');
                    }
                }, 80);
            }

            hideQuote() {
                this.quoteContainer.classList.remove('show');
                this.actionButtons.classList.remove('show');
            }

            updateEmotionColor(emotionKey) {
                const colorValue = CONFIG.emotion[emotionKey].color;
                document.documentElement.style.setProperty('--emotion-color', colorValue);
                // 转换为 rgb 格式用于粒子系统
                return this.hexToRgb(colorValue);
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? `rgb(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)})` : 'rgb(224, 224, 224)';
            }
        }

        const uiManager = new UIManager();

        // ==================== 动画序列控制器 ====================
        class AnimationSequence {
            static async transitionToMood(emotionKey) {
                return new Promise((resolve) => {
                    const rgbColor = uiManager.updateEmotionColor(emotionKey);

                    // 光球爆炸
                    particleSystem.explodeFromCenter(rgbColor, 150);

                    // 背景颜色过渡
                    const root = document.documentElement;
                    const oldColor = getComputedStyle(root).getPropertyValue('--emotion-color').trim();

                    gsap.to(root, {
                        '--primary-color': this.shadeColor(CONFIG.emotion[emotionKey].color, -20),
                        '--secondary-color': this.shadeColor(CONFIG.emotion[emotionKey].color, -40),
                        duration: 0.8,
                        ease: 'power2.inOut'
                    });

                    // 粒子动画 + 音效
                    audioSynth.playChime(1200, 0.3);
                    audioSynth.playChime(1000, 0.25);

                    let frameCount = 0;
                    const animateParticles = () => {
                        particleSystem.update();
                        particleSystem.render();
                        frameCount++;
                        if (frameCount < 180) {
                            requestAnimationFrame(animateParticles);
                        } else {
                            resolve();
                        }
                    };
                    animateParticles();
                });
            }

            static async transitionToRitual() {
                return new Promise((resolve) => {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;

                    uiManager.showPressHint();

                    let frameCount = 0;
                    const animateAttract = () => {
                        particleSystem.attractToCenter(0.1);
                        particleSystem.update();
                        particleSystem.render();
                        frameCount++;
                        if (frameCount < 150) {
                            requestAnimationFrame(animateAttract);
                        } else {
                            resolve();
                        }
                    };
                    animateAttract();
                });
            }

            static async revealQuote(emotionKey) {
                return new Promise((resolve) => {
                    uiManager.hidePressHint();

                    // 随机获取语录
                    const quotes = CONFIG.healingQuotes[emotionKey];
                    const quote = quotes[Math.floor(Math.random() * quotes.length)];

                    // 粒子聚拢并淡出
                    gsap.to(document.querySelector('.particle-canvas'), {
                        opacity: 0,
                        duration: 1.5,
                        ease: 'power2.inOut'
                    });

                    // 显示语录
                    setTimeout(() => {
                        uiManager.showQuote(quote);
                        resolve();
                    }, 800);
                });
            }

            static shadeColor(color, percent) {
                const num = parseInt(color.replace("#", ""), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max(0, Math.min(255, (num >> 16) + amt));
                const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF) + amt));
                const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
                return "#" + (0x1000000 + (R < 16 ? 0 : 1) * R * 0x10000 + (G < 16 ? 0 : 1) * G * 0x100 + (B < 16 ? 0 : 1) * B).toString(16).slice(1);
            }
        }

        // ==================== 事件处理 ====================
        class EventHandler {
            constructor() {
                this.setupOrbInteraction();
                this.setupEmotionSelection();
                this.setupPressDetection();
                this.setupActionButtons();
                this.setupMouseTracking();
                console.log('EventHandler initialized successfully');
            }

            setupOrbInteraction() {
                const orbElement = document.getElementById('liquidOrb');
                
                if (!orbElement) {
                    console.error('liquidOrb element not found');
                    return;
                }

                orbElement.addEventListener('click', async (e) => {
                    console.log('Orb clicked, isSelecting:', appState.isSelecting, 'isRitualing:', appState.isRitualing);
                    
                    if (appState.isSelecting || appState.isRitualing) {
                        console.log('Already selecting or ritualing, ignoring click');
                        return;
                    }

                    this.createRipple(e, orbElement);
                    
                    appState.isSelecting = true;
                    console.log('Starting emotion selection');
                    audioSynth.playChime(800, 0.2);
                    uiManager.showEmotionSelector();
                    
                    document.getElementById('introGuide').style.opacity = '0';
                });
            }

            createRipple(event, element) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
                
                element.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            }

            setupEmotionSelection() {
                document.querySelectorAll('.emotion-ball').forEach(ball => {
                    ball.addEventListener('click', async (e) => {
                        if (appState.isRitualing) return;

                        const emotionKey = e.target.dataset.emotion;
                        appState.currentEmotionKey = emotionKey;

                        uiManager.hideEmotionSelector();
                        document.getElementById('liquidOrb').style.opacity = '0';
                        document.getElementById('hintText').style.display = 'none';

                        await AnimationSequence.transitionToMood(emotionKey);
                        await AnimationSequence.transitionToRitual();

                        appState.isRitualing = true;
                        appState.isPressing = false;
                        appState.pressStartTime = 0;
                    });
                });
            }

            setupPressDetection() {
                const orbElement = document.getElementById('liquidOrb');
                const countdownNumber = document.getElementById('countdownNumber');
                const glowRing = document.getElementById('glowRing');
                const rainbowGlow = document.getElementById('rainbowGlow');

                document.addEventListener('mousedown', (e) => {
                    if (!appState.isRitualing) return;

                    appState.isPressing = true;
                    appState.pressStartTime = Date.now();

                    orbElement.classList.add('shaking');
                    orbElement.classList.add('heartbeat');
                    uiManager.showPressProgress(0);

                    glowRing.style.opacity = '1';
                    rainbowGlow.classList.add('active');

                    let countdown = 3;
                    countdownNumber.textContent = countdown;
                    countdownNumber.classList.add('show');

                    const pressInterval = setInterval(() => {
                        if (!appState.isPressing) {
                            clearInterval(pressInterval);
                            return;
                        }

                        const elapsed = Date.now() - appState.pressStartTime;
                        const progress = Math.min(elapsed / 3000, 1);

                        uiManager.showPressProgress(progress);

                        if (progress > 0.3 && Math.random() > 0.8) {
                            audioSynth.playWhiteNoise(0.2, 0.05 + progress * 0.1);
                        }

                        const newCountdown = Math.ceil(3 - progress * 3);
                        if (newCountdown !== countdown && newCountdown > 0) {
                            countdown = newCountdown;
                            countdownNumber.textContent = countdown;
                            countdownNumber.classList.remove('show');
                            setTimeout(() => countdownNumber.classList.add('show'), 50);
                            audioSynth.playChime(800 + (3 - countdown) * 200, 0.15);
                        }

                        if (progress >= 1) {
                            clearInterval(pressInterval);
                            this.completePressRitual();
                        }
                    }, 50);
                });

                document.addEventListener('mouseup', () => {
                    if (appState.isPressing && appState.isRitualing) {
                        const elapsed = Date.now() - appState.pressStartTime;
                        if (elapsed < 3000) {
                            audioSynth.playChime(600, 0.15);
                        }
                    }
                    appState.isPressing = false;
                    orbElement.classList.remove('shaking');
                    orbElement.classList.remove('heartbeat');
                    uiManager.hidePressProgress();
                    document.getElementById('countdownNumber').classList.remove('show');
                    document.getElementById('glowRing').style.opacity = '0';
                    document.getElementById('rainbowGlow').classList.remove('active');
                });

                document.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    document.dispatchEvent(mouseEvent);
                });

                document.addEventListener('touchend', () => {
                    document.dispatchEvent(new MouseEvent('mouseup'));
                });
            }

            completePressRitual() {
                const orbElement = document.getElementById('liquidOrb');
                orbElement.classList.remove('shaking');
                orbElement.classList.remove('heartbeat');
                uiManager.hidePressProgress();
                document.getElementById('countdownNumber').classList.remove('show');
                document.getElementById('glowRing').style.opacity = '0';
                document.getElementById('rainbowGlow').classList.remove('active');

                const emotionKey = appState.currentEmotionKey;
                const rgbColor = uiManager.updateEmotionColor(emotionKey);
                particleSystem.explodeFromCenter(rgbColor, 150);

                audioSynth.playChime(1400, 0.25);
                audioSynth.playWhiteNoise(0.5, 0.15);

                this.createFallingPetals();
                this.createTwinklingStars();

                setTimeout(async () => {
                    appState.isRitualing = false;
                    await AnimationSequence.revealQuote(emotionKey);
                }, 200);
            }

            createFallingPetals() {
                const container = document.getElementById('petalsContainer');
                container.innerHTML = '';
                
                for (let i = 0; i < 30; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = Math.random() * 100 + '%';
                    petal.style.animationDuration = (3 + Math.random() * 4) + 's';
                    petal.style.animationDelay = (Math.random() * 2) + 's';
                    petal.style.background = `radial-gradient(circle at 30% 30%, 
                        rgba(255, 255, 255, 0.9), 
                        ${CONFIG.emotion[appState.currentEmotionKey].color}40)`;
                    container.appendChild(petal);
                }

                setTimeout(() => {
                    container.innerHTML = '';
                }, 8000);
            }

            createTwinklingStars() {
                const container = document.getElementById('petalsContainer');
                
                for (let i = 0; i < 20; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = (Math.random() * 2) + 's';
                    star.style.boxShadow = `0 0 6px ${CONFIG.emotion[appState.currentEmotionKey].color}`;
                    container.appendChild(star);
                }

                setTimeout(() => {
                    const stars = container.querySelectorAll('.star');
                    stars.forEach(star => star.remove());
                }, 6000);
            }

            setupActionButtons() {
                document.getElementById('downloadBtn').addEventListener('click', () => {
                    this.downloadQuoteCard();
                });

                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.restart();
                });
            }

            async downloadQuoteCard() {
                const quoteContainer = document.getElementById('quoteContainer');
                try {
                    const canvas = await html2canvas(quoteContainer, {
                        backgroundColor: null,
                        scale: 2,
                        logging: false
                    });

                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `mind-bubble-${Date.now()}.png`;
                    link.click();

                    audioSynth.playChime(1200, 0.15);
                    audioSynth.playChime(1400, 0.15);
                } catch (err) {
                    console.error('截图失败:', err);
                }
            }

            restart() {
                audioSynth.playChime(1000, 0.2);

                // 重置状态
                appState.currentEmotionKey = null;
                appState.isSelecting = false;
                appState.isRitualing = false;
                appState.isPressing = false;

                // 隐藏语录
                uiManager.hideQuote();

                // 恢复背景和光球
                gsap.to(document.documentElement, {
                    '--primary-color': '#1a1a2e',
                    '--secondary-color': '#16213e',
                    '--emotion-color': '#e0e0e0',
                    duration: 0.8,
                    ease: 'power2.inOut'
                });

                // 清空粒子
                particleSystem.particles = [];
                const particleCanvas = document.getElementById('particleCanvas');
                particleCanvas.getContext('2d').clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                particleCanvas.style.opacity = '1';

                // 显示光球和文案
                const orbElement = document.getElementById('liquidOrb');
                orbElement.style.opacity = '1';
                document.getElementById('hintText').style.display = 'block';

                // 重新初始化背景粒子轻微变化
                bgParticles.init();
            }

            setupMouseTracking() {
                const orbElement = document.getElementById('liquidOrb');

                document.addEventListener('mousemove', (e) => {
                    appState.mouseX = e.clientX;
                    appState.mouseY = e.clientY;

                    if (!appState.isSelecting && !appState.isRitualing) {
                        const centerX = window.innerWidth / 2;
                        const centerY = window.innerHeight / 2;

                        const dx = appState.mouseX - centerX;
                        const dy = appState.mouseY - centerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const maxDistance = 150;

                        if (distance < maxDistance) {
                            const moveX = (dx / maxDistance) * 30;
                            const moveY = (dy / maxDistance) * 30;

                            gsap.to(orbElement, {
                                x: moveX,
                                y: moveY,
                                duration: 0.3,
                                overwrite: 'auto'
                            });
                        }
                    }
                });
            }
        }

        // ==================== 应用初始化 ====================
        function initializeApp() {
            console.log('Initializing app...');
            
            const orbElement = document.getElementById('liquidOrb');
            const introGuide = document.getElementById('introGuide');
            
            if (orbElement) {
                orbElement.classList.add('breathing');
                console.log('Added breathing animation to orb');
            } else {
                console.error('orbElement not found during initialization');
            }

            if (introGuide) {
                introGuide.style.opacity = '1';
            }

            try {
                new EventHandler();
                console.log('EventHandler created successfully');
            } catch (error) {
                console.error('Failed to create EventHandler:', error);
            }

            document.addEventListener('click', () => {
                if (audioSynth.audioContext.state === 'suspended') {
                    audioSynth.audioContext.resume();
                    console.log('Audio context resumed');
                }
            }, { once: true });
        }

        // 使用多种方式确保 DOM 已准备好
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }

        window.addEventListener('load', () => {
            console.log('Window load event fired');
        });
    </script>
